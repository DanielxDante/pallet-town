<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" name="description" content="Portfolio Site" />
		<title>Daniel Tay</title>
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Pre-hydration theme boot — avoids flash of wrong theme on first paint.
			// Mirrors detectInitial() in src/lib/theme/theme.svelte.ts.
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var theme =
						stored === 'coffee' || stored === 'matcha'
							? stored
							: window.matchMedia('(prefers-color-scheme: light)').matches
								? 'matcha'
								: 'coffee';
					document.documentElement.dataset.theme = theme;
				} catch (_) {
					document.documentElement.dataset.theme = 'coffee';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
